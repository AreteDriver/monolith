name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check backend/ tests/ eval/

      - name: Ruff format check
        run: ruff format --check backend/ tests/ eval/

      - name: Run tests with coverage
        run: pytest tests/ -x -q --cov=backend --cov-fail-under=80

      - name: Run eval suite (detection quality)
        run: |
          python demo_seed.py --db eval_test.db
          python eval/detection_quality.py --db eval_test.db --fail-on-regression

      - name: Run narration eval (template mode — no API key in CI)
        run: python eval/narration_eval.py --db eval_test.db --fail-on-regression

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npx eslint . --max-warnings 6

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CICD }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          COLOR=$([ "$STATUS" = "success" ] && echo 3066993 || echo 15158332)
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$ICON ${{ github.repository }}\",\"description\":\"Branch: ${{ github.ref_name }} | Status: $STATUS\",\"color\":$COLOR}]}"
